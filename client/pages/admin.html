<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Административная панель АЙДА">
    <meta name="theme-color" content="#007aff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AЙДA - Админка">
    <title>Админ-панель — AЙДA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* ========== APPLE ПРЕМИУМ СИСТЕМА ========== */
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f9f9fb;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-tertiary: #8e8e93;
            --border: rgba(0, 0, 0, 0.06);
            --border-focus: rgba(0, 0, 0, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02), 0 0 0 1px var(--border);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.04), 0 0 0 1px var(--border);
            --shadow-lg: 0 20px 38px -10px rgba(0, 0, 0, 0.08), 0 0 0 1px var(--border);
            --accent: #007aff;
            --accent-grad: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            --accent-grad-light: linear-gradient(135deg, rgba(0,122,255,0.12) 0%, rgba(88,86,214,0.12) 100%);
            --danger: #ff3b30;
            --danger-grad: linear-gradient(135deg, #ff3b30 0%, #ff9500 100%);
            --warning: #ff9500;
            --success: #34c759;
            --card-bg: rgba(255, 255, 255, 0.92);
            --blur-bg: rgba(255, 255, 255, 0.72);
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 100px;
            --transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --transition-bounce: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            --sidebar-width: 280px;
        }

        [data-theme="dark"] {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --text-tertiary: #636366;
            --border: rgba(255, 255, 255, 0.06);
            --border-focus: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--border);
            --card-bg: rgba(28, 28, 30, 0.92);
            --blur-bg: rgba(28, 28, 30, 0.78);
            --accent: #0a84ff;
            --accent-grad: linear-gradient(135deg, #0a84ff 0%, #5e5ce6 100%);
            --accent-grad-light: linear-gradient(135deg, rgba(10,132,255,0.15) 0%, rgba(94,92,230,0.15) 100%);
        }

        body {
            font-family: -apple-system, 'Inter', system-ui, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.4s ease, color 0.3s ease;
        }

        /* ========== ХЕДЕР ========== */
        .header {
            position: sticky;
            top: 0;
            backdrop-filter: blur(24px) saturate(180%);
            background: var(--blur-bg);
            border-bottom: 0.5px solid var(--border);
            padding: var(--spacing-sm) var(--spacing-lg);
            z-index: 100;
        }

        .header-container {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            background: var(--accent-grad);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .admin-badge {
            background: var(--accent-grad);
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            margin-left: 8px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .header-action {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-secondary);
            padding: 6px;
            transition: var(--transition-bounce);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-action:hover {
            background: var(--accent-grad-light);
            color: var(--accent);
            transform: scale(1.05);
        }

        .profile-dropdown {
            position: relative;
        }

        .profile-btn {
            background: var(--bg-tertiary);
            border: 0.5px solid var(--border);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            cursor: pointer;
            overflow: hidden;
            transition: var(--transition-bounce);
        }

        .profile-btn:hover {
            transform: scale(1.05);
            border-color: var(--accent);
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: var(--spacing-sm);
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 0.5px solid var(--border);
            width: 240px;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 100;
            transform: translateY(-8px);
        }

        .profile-dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-header {
            padding: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .dropdown-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .dropdown-name {
            font-weight: 600;
        }

        .dropdown-email {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            color: var(--text-primary);
            text-decoration: none;
            transition: var(--transition);
            font-size: 0.9rem;
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
        }

        .dropdown-item:hover {
            background: var(--accent-grad-light);
            color: var(--accent);
        }

        hr {
            border: none;
            border-top: 0.5px solid var(--border);
            margin: var(--spacing-xs) 0;
        }

        .theme-toggle {
            background: var(--bg-tertiary);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-full);
            padding: 6px 14px;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition-bounce);
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            transform: scale(1.02);
            border-color: var(--accent);
            background: var(--accent-grad-light);
            color: var(--accent);
        }

        /* ========== АДМИН ЛЕЙАУТ ========== */
        .admin-layout {
            display: flex;
            min-height: calc(100vh - 130px);
        }

        /* Сайдбар */
        .admin-sidebar {
            width: var(--sidebar-width);
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-right: 0.5px solid var(--border);
            padding: var(--spacing-lg) 0;
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
            padding: 0 var(--spacing-sm);
        }

        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-sm) var(--spacing-md);
            background: transparent;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-bounce);
            width: 100%;
            text-align: left;
            position: relative;
        }

        .admin-nav-item .nav-icon {
            font-size: 1.2rem;
            width: 24px;
        }

        .admin-nav-item:hover {
            background: var(--accent-grad-light);
            color: var(--accent);
            transform: translateX(4px);
        }

        .admin-nav-item.active {
            background: var(--accent-grad);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .admin-nav-item.active .nav-icon {
            color: white;
        }

        .nav-badge {
            margin-left: auto;
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: var(--radius-full);
        }

        /* Контент */
        .admin-content {
            flex: 1;
            padding: var(--spacing-xl);
            overflow-x: auto;
        }

        .loading-admin {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-secondary);
        }

        /* Карточки дашборда */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            border: 0.5px solid var(--border);
            padding: var(--spacing-lg);
            transition: var(--transition-bounce);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
        }

        .stat-icon {
            font-size: 2rem;
            color: var(--accent);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            border: 0.5px solid var(--border);
            padding: var(--spacing-lg);
        }

        .chart-card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: var(--spacing-md);
        }

        canvas {
            max-height: 250px;
        }

        /* Таблицы */
        .data-table {
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            border: 0.5px solid var(--border);
            overflow: hidden;
        }

        .data-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: var(--spacing-md);
            text-align: left;
            border-bottom: 0.5px solid var(--border);
        }

        .data-table th {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
        }

        .data-table tr:hover {
            background: var(--accent-grad-light);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-warning {
            background: var(--warning);
            color: white;
        }

        .badge-danger {
            background: var(--danger);
            color: white;
        }

        .badge-success {
            background: var(--success);
            color: white;
        }

        .badge-info {
            background: var(--accent);
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: var(--spacing-xs);
        }

        .action-btn {
            background: var(--bg-tertiary);
            border: 0.5px solid var(--border);
            padding: 6px 12px;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .action-btn:hover {
            background: var(--accent-grad-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-danger {
            background: var(--danger-grad);
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius-full);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-bounce);
        }

        .btn-primary {
            background: var(--accent-grad);
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius-full);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-bounce);
        }

        .btn-secondary {
            background: transparent;
            border: 0.5px solid var(--border);
            padding: 8px 20px;
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-bounce);
        }

        .btn-secondary:hover,
        .btn-primary:hover,
        .btn-danger:hover {
            transform: scale(1.02);
        }

        /* Формы в модалках */
        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: var(--spacing-xs);
        }

        .input-field {
            width: 100%;
            background: var(--bg-tertiary);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: var(--transition);
            font-family: inherit;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 480px;
            width: 100%;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            border: 0.5px solid var(--border);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 0.5px solid var(--border);
        }

        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .modal-close:hover {
            background: var(--accent-grad-light);
            color: var(--accent);
        }

        .modal-body {
            padding: var(--spacing-lg);
        }

        .modal-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: flex-end;
            margin-top: var(--spacing-lg);
        }

        .success-icon, .error-icon {
            font-size: 3rem;
            text-align: center;
            margin-bottom: var(--spacing-md);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            pointer-events: none;
        }

        .toast {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-full);
            padding: var(--spacing-sm) var(--spacing-lg);
            box-shadow: var(--shadow-lg);
            border: 0.5px solid var(--border);
            font-size: 0.85rem;
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Футер */
        .admin-footer {
            background: var(--bg-tertiary);
            border-top: 0.5px solid var(--border);
            padding: var(--spacing-md) var(--spacing-lg);
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                position: relative;
                top: 0;
                height: auto;
                border-right: none;
                border-bottom: 0.5px solid var(--border);
                padding: var(--spacing-sm);
            }
            .admin-nav {
                flex-direction: row;
                flex-wrap: wrap;
                gap: var(--spacing-xs);
            }
            .admin-nav-item {
                width: auto;
                padding: var(--spacing-xs) var(--spacing-sm);
                font-size: 0.8rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .data-table {
                overflow-x: auto;
                display: block;
            }
            .admin-content {
                padding: var(--spacing-md);
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-container">
                <a href="/" class="logo">
                    <span class="logo-text">AЙДA</span>
                    <span class="admin-badge"><i class="fas fa-shield-alt"></i> ADMIN</span>
                </a>
                <div class="header-actions">
                    <a href="/" class="header-action" title="На сайт"><i class="fas fa-home"></i></a>
                    <a href="/notifications.html" class="header-action"><i class="far fa-bell"></i></a>
                    <div class="profile-dropdown">
                        <button class="profile-btn">
                            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=80&h=80&fit=crop" alt="Профиль" class="profile-avatar">
                        </button>
                        <div class="dropdown-menu">
                            <div class="dropdown-header">
                                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=80&h=80&fit=crop" alt="" class="dropdown-avatar">
                                <div class="dropdown-user-info">
                                    <div class="dropdown-name">Администратор</div>
                                    <div class="dropdown-email">admin@aida.ru</div>
                                </div>
                            </div>
                            <hr>
                            <a href="/profile.html" class="dropdown-item"><i class="fas fa-user"></i> Мой профиль</a>
                            <hr>
                            <button id="logout-btn" class="dropdown-item"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                        </div>
                    </div>
                    <button id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
                </div>
            </div>
        </header>

        <div class="admin-layout">
            <aside class="admin-sidebar">
                <nav class="admin-nav">
                    <button class="admin-nav-item active" data-tab="dashboard"><i class="fas fa-chart-pie nav-icon"></i> Дашборд</button>
                    <button class="admin-nav-item" data-tab="users"><i class="fas fa-users nav-icon"></i> Пользователи <span class="nav-badge" id="users-badge">12</span></button>
                    <button class="admin-nav-item" data-tab="moderation"><i class="fas fa-clipboard-list nav-icon"></i> Модерация <span class="nav-badge" id="moderation-badge">5</span></button>
                    <button class="admin-nav-item" data-tab="complaints"><i class="fas fa-exclamation-triangle nav-icon"></i> Жалобы <span class="nav-badge" id="complaints-badge">3</span></button>
                    <button class="admin-nav-item" data-tab="payments"><i class="fas fa-credit-card nav-icon"></i> Платные услуги</button>
                    <button class="admin-nav-item" data-tab="settings"><i class="fas fa-cog nav-icon"></i> Настройки</button>
                    <button class="admin-nav-item" data-tab="operators"><i class="fas fa-user-tie nav-icon"></i> Операторы</button>
                    <button class="admin-nav-item" data-tab="logs"><i class="fas fa-history nav-icon"></i> Логи ошибок</button>
                    <button class="admin-nav-item" data-tab="export"><i class="fas fa-download nav-icon"></i> Экспорт</button>
                </nav>
            </aside>

            <main class="admin-content" id="admin-content">
                <div class="loading-admin"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>
            </main>
        </div>

        <footer class="admin-footer">
            <div class="copyright">© 2025 AЙДA. Административная панель</div>
        </footer>
    </div>

    <!-- Модалки -->
    <div id="block-user-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-lock"></i> Блокировка пользователя</h3>
                <button class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Причина блокировки</label>
                    <textarea id="block-reason" class="input-field" rows="3" placeholder="Укажите причину..."></textarea>
                </div>
                <div class="form-group">
                    <label>Срок блокировки</label>
                    <select id="block-duration" class="input-field">
                        <option value="24h">24 часа</option>
                        <option value="7d">7 дней</option>
                        <option value="permanent">Навсегда</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary cancel-block">Отмена</button>
                    <button class="btn-danger confirm-block">Заблокировать</button>
                </div>
            </div>
        </div>
    </div>

    <div id="reject-listing-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-times-circle"></i> Отклонение объявления</h3>
                <button class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Причина отклонения</label>
                    <textarea id="reject-reason" class="input-field" rows="3" placeholder="Укажите причину для пользователя..."></textarea>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary cancel-reject">Отмена</button>
                    <button class="btn-danger confirm-reject">Отклонить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="resolve-complaint-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-gavel"></i> Обработка жалобы</h3>
                <button class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Действие</label>
                    <select id="complaint-action" class="input-field">
                        <option value="ignore">Игнорировать</option>
                        <option value="warn">Выдать предупреждение</option>
                        <option value="delete_listing">Удалить объявление</option>
                        <option value="block_user">Заблокировать пользователя</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Комментарий (необязательно)</label>
                    <textarea id="complaint-comment" class="input-field" rows="3" placeholder="Комментарий к решению..."></textarea>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary cancel-resolve">Отмена</button>
                    <button class="btn-primary confirm-resolve">Применить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="add-operator-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user-plus"></i> Добавить оператора</h3>
                <button class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Telegram ID</label>
                    <input type="text" id="operator-telegram" class="input-field" placeholder="@username или ID">
                </div>
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="operator-name" class="input-field" placeholder="Имя оператора">
                </div>
                <div class="form-group">
                    <label>Роль</label>
                    <select id="operator-role" class="input-field">
                        <option value="operator">Оператор</option>
                        <option value="senior_operator">Старший оператор</option>
                        <option value="supervisor">Супервизор</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary cancel-operator">Отмена</button>
                    <button class="btn-primary confirm-operator">Добавить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="success-modal" class="modal">
        <div class="modal-content">
            <div class="modal-body">
                <div class="success-icon"><i class="fas fa-check-circle" style="color: #34c759; font-size: 4rem;"></i></div>
                <h3 id="success-title" style="text-align: center;">Успешно!</h3>
                <p id="success-message" style="text-align: center; color: var(--text-secondary);"></p>
                <div class="modal-actions" style="justify-content: center;">
                    <button class="btn-primary success-close">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="error-modal" class="modal">
        <div class="modal-content">
            <div class="modal-body">
                <div class="error-icon"><i class="fas fa-exclamation-circle" style="color: #ff3b30; font-size: 4rem;"></i></div>
                <h3 style="text-align: center;">Ошибка</h3>
                <p id="error-message" style="text-align: center; color: var(--text-secondary);"></p>
                <div class="modal-actions" style="justify-content: center;">
                    <button class="btn-primary error-close">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        // Тёмная тема
        const themeToggle = document.getElementById('theme-toggle');
        const root = document.documentElement;
        if (localStorage.getItem('theme') === 'dark') root.setAttribute('data-theme', 'dark');
        
        themeToggle.addEventListener('click', () => {
            if (root.getAttribute('data-theme') === 'dark') {
                root.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            } else {
                root.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
        });

        // Данные
        let charts = {};

        // Рендер дашборда
        function renderDashboard() {
            const html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-header"><i class="fas fa-users stat-icon"></i></div>
                        <div class="stat-value">1,234</div>
                        <div class="stat-label">Всего пользователей</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header"><i class="fas fa-tags stat-icon"></i></div>
                        <div class="stat-value">5,678</div>
                        <div class="stat-label">Активных объявлений</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header"><i class="fas fa-eye stat-icon"></i></div>
                        <div class="stat-value">123.4K</div>
                        <div class="stat-label">Просмотров сегодня</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header"><i class="fas fa-ruble-sign stat-icon"></i></div>
                        <div class="stat-value">₽ 456K</div>
                        <div class="stat-label">Доход за месяц</div>
                    </div>
                </div>
                <div class="charts-grid">
                    <div class="chart-card"><h3>Регистрации по дням</h3><canvas id="usersChart"></canvas></div>
                    <div class="chart-card"><h3>Объявления по дням</h3><canvas id="listingsChart"></canvas></div>
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>Пользователь</th><th>Действие</th><th>Время</th></tr></thead>
                        <tbody>
                            <tr><td>alex@example.com</td><td>Опубликовал объявление</td><td>5 мин назад</td></tr>
                            <tr><td>maria@example.com</td><td>Зарегистрировался</td><td>12 мин назад</td></tr>
                            <tr><td>ivan@example.com</td><td>Купил VIP</td><td>1 час назад</td></tr>
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('admin-content').innerHTML = html;
            
            // Графики
            const ctx1 = document.getElementById('usersChart')?.getContext('2d');
            const ctx2 = document.getElementById('listingsChart')?.getContext('2d');
            if (ctx1) {
                charts.users = new Chart(ctx1, {
                    type: 'line',
                    data: { labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'], datasets: [{ label: 'Пользователи', data: [12, 19, 15, 17, 14, 23, 21], borderColor: '#007aff', tension: 0.4, fill: false }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }
            if (ctx2) {
                charts.listings = new Chart(ctx2, {
                    type: 'line',
                    data: { labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'], datasets: [{ label: 'Объявления', data: [8, 12, 10, 15, 18, 22, 20], borderColor: '#5856d6', tension: 0.4, fill: false }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }
        }

        // Рендер пользователей
        function renderUsers() {
            const html = `
                <div class="data-table">
                    <table>
                        <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Статус</th><th>Дата регистрации</th><th>Действия</th></tr></thead>
                        <tbody>
                            <tr><td>1</td><td>Алексей</td><td>alex@example.com</td><td><span class="badge badge-success">Активен</span></td><td>01.01.2024</td><td class="action-buttons"><button class="action-btn block-user" data-user="1"><i class="fas fa-lock"></i></button></td></tr>
                            <tr><td>2</td><td>Мария</td><td>maria@example.com</td><td><span class="badge badge-warning">Заблокирован</span></td><td>15.02.2024</td><td class="action-buttons"><button class="action-btn unblock-user" data-user="2"><i class="fas fa-unlock"></i></button></td></tr>
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('admin-content').innerHTML = html;
            document.querySelectorAll('.block-user').forEach(btn => btn.onclick = () => openModal('block-user-modal'));
        }

        // Рендер модерации
        function renderModeration() {
            const html = `
                <div class="data-table">
                    <table>
                        <thead><tr><th>Объявление</th><th>Пользователь</th><th>Дата</th><th>Действия</th></tr></thead>
                        <tbody>
                            <tr><td>iPhone 15 Pro</td><td>alex@example.com</td><td>сегодня</td><td class="action-buttons"><button class="action-btn approve-listing"><i class="fas fa-check"></i></button><button class="action-btn reject-listing"><i class="fas fa-times"></i></button></td></tr>
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('admin-content').innerHTML = html;
            document.querySelectorAll('.reject-listing').forEach(btn => btn.onclick = () => openModal('reject-listing-modal'));
        }

        // Рендер жалоб
        function renderComplaints() {
            const html = `
                <div class="data-table">
                    <table>
                        <thead><tr><th>Жалоба</th><th>На что</th><th>От пользователя</th><th>Статус</th><th>Действия</th></tr></thead>
                        <tbody>
                            <tr><td>Спам</td><td>Объявление #123</td><td>ivan@example.com</td><td><span class="badge badge-warning">Новая</span></td><td class="action-buttons"><button class="action-btn resolve-complaint"><i class="fas fa-gavel"></i></button></td></tr>
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('admin-content').innerHTML = html;
            document.querySelectorAll('.resolve-complaint').forEach(btn => btn.onclick = () => openModal('resolve-complaint-modal'));
        }

        // Рендер платежей
        function renderPayments() {
            const html = `
                <div class="data-table">
                    <table>
                        <thead><tr><th>Пользователь</th><th>Услуга</th><th>Сумма</th><th>Дата</th><th>Статус</th></tr></thead>
                        <tbody>
                            <tr><td>alex@example.com</td><td>VIP</td><td>1000 ₽</td><td>01.01.2024</td><td><span class="badge badge-success">Оплачено</span></td></tr>
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('admin-content').innerHTML = html;
        }

        // Рендер настроек
        function renderSettings() {
            const html = `
                <div class="chart-card">
                    <h3>Общие настройки</h3>
                    <div class="form-group"><label>Название сайта</label><input type="text" class="input-field" value="AЙДA"></div>
                    <div class="form-group"><label>Email поддержки</label><input type="email" class="input-field" value="support@aida.ru"></div>
                    <button class="btn-primary">Сохранить</button>
                </div>
            `;
            document.getElementById('admin-content').innerHTML = html;
        }

        // Рендер операторов
        function renderOperators() {
            const html = `
                <div style="margin-bottom: var(--spacing-lg);"><button class="btn-primary" id="add-operator-btn"><i class="fas fa-plus"></i> Добавить оператора</button></div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>Telegram</th><th>Имя</th><th>Роль</th><th>Действия</th></tr></thead>
                        <tbody>
                            <tr><td>@operator1</td><td>Иван</td><td>Оператор</td><td class="action-buttons"><button class="action-btn"><i class="fas fa-trash"></i></button></td></tr>
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('admin-content').innerHTML = html;
            document.getElementById('add-operator-btn')?.addEventListener('click', () => openModal('add-operator-modal'));
        }

        // Рендер логов
        function renderLogs() {
            const html = `
                <div class="data-table">
                    <table>
                        <thead><tr><th>Время</th><th>Уровень</th><th>Сообщение</th></tr></thead>
                        <tbody>
                            <tr><td>2024-01-01 12:00</td><td><span class="badge badge-danger">ERROR</span></td><td>Ошибка подключения к БД</td></tr>
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('admin-content').innerHTML = html;
        }

        // Рендер экспорта
        function renderExport() {
            const html = `
                <div class="chart-card">
                    <h3>Экспорт данных</h3>
                    <div class="form-group"><label>Период</label><select class="input-field"><option>За последние 30 дней</option><option>За последний месяц</option><option>За всё время</option></select></div>
                    <div class="form-group"><label>Тип данных</label><select class="input-field"><option>Пользователи</option><option>Объявления</option><option>Платежи</option></select></div>
                    <button class="btn-primary"><i class="fas fa-download"></i> Экспортировать CSV</button>
                </div>
            `;
            document.getElementById('admin-content').innerHTML = html;
        }

        // Навигация
        const navItems = document.querySelectorAll('.admin-nav-item');
        let currentTab = 'dashboard';

        function loadAdminTab(tab) {
            currentTab = tab;
            document.getElementById('admin-content').innerHTML = '<div class="loading-admin"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>';
            setTimeout(() => {
                if (tab === 'dashboard') renderDashboard();
                else if (tab === 'users') renderUsers();
                else if (tab === 'moderation') renderModeration();
                else if (tab === 'complaints') renderComplaints();
                else if (tab === 'payments') renderPayments();
                else if (tab === 'settings') renderSettings();
                else if (tab === 'operators') renderOperators();
                else if (tab === 'logs') renderLogs();
                else if (tab === 'export') renderExport();
            }, 100);
        }

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                loadAdminTab(item.dataset.tab);
            });
        });

        // Модалки
        function openModal(modalId) {
            document.getElementById(modalId)?.classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId)?.classList.remove('active');
        }

        document.querySelectorAll('.modal-close, .success-close, .error-close, .cancel-block, .cancel-reject, .cancel-resolve, .cancel-operator').forEach(btn => {
            btn.addEventListener('click', () => {
                const modal = btn.closest('.modal');
                if (modal) modal.classList.remove('active');
            });
        });

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });
        });

        // Подтверждения
        document.querySelector('.confirm-block')?.addEventListener('click', () => {
            closeModal('block-user-modal');
            showSuccessModal('Успешно', 'Пользователь заблокирован');
        });
        document.querySelector('.confirm-reject')?.addEventListener('click', () => {
            closeModal('reject-listing-modal');
            showSuccessModal('Успешно', 'Объявление отклонено');
        });
        document.querySelector('.confirm-resolve')?.addEventListener('click', () => {
            closeModal('resolve-complaint-modal');
            showSuccessModal('Успешно', 'Жалоба обработана');
        });
        document.querySelector('.confirm-operator')?.addEventListener('click', () => {
            closeModal('add-operator-modal');
            showSuccessModal('Успешно', 'Оператор добавлен');
        });

        function showSuccessModal(title, message) {
            document.getElementById('success-title').textContent = title;
            document.getElementById('success-message').textContent = message;
            document.getElementById('success-modal').classList.add('active');
        }

        function showErrorModal(message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-modal').classList.add('active');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        window.showSuccessModal = showSuccessModal;
        window.showErrorModal = showErrorModal;
        window.showToast = showToast;

        // Запуск
        loadAdminTab('dashboard');
    </script>
</body>
</html>

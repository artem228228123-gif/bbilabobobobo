# ============================================
# AIDA — Премиальная доска объявлений
# Версия: 3.0 ULTRA
# Файл: nginx/sites-available/aida.conf
# Описание: Конфигурация сайта aida.ru
# ============================================

# ============================================
# HTTP редирект на HTTPS
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name aida.ru www.aida.ru api.aida.ru admin.aida.ru;
    
    # Логи
    access_log /var/log/nginx/aida_http_access.log;
    error_log /var/log/nginx/aida_http_error.log;
    
    # Редирект на HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
    
    # Let's Encrypt верификация
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

# ============================================
# HTTPS - ОСНОВНОЙ САЙТ
# ============================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aida.ru www.aida.ru;
    
    # ========================================
    # SSL КОНФИГУРАЦИЯ
    # ========================================
    
    ssl_certificate /etc/letsencrypt/live/aida.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aida.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/aida.ru/chain.pem;
    
    include /etc/nginx/conf.d/ssl-params.conf;
    
    # ========================================
    # ЛОГИ
    # ========================================
    
    access_log /var/log/nginx/aida_access.log;
    error_log /var/log/nginx/aida_error.log;
    
    # ========================================
    # СТАТИЧЕСКИЕ ФАЙЛЫ
    # ========================================
    
    root /var/www/html;
    index index.html;
    
    # Кеширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }
    
    # HTML файлы (не кешировать)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Vary "Accept-Encoding";
    }
    
    # ========================================
    # API ПРОКСИ
    # ========================================
    
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn_limit 10;
        
        proxy_pass http://aida_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache api_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 1m;
        proxy_cache_valid 404 1m;
        proxy_cache_bypass $http_cache_control;
        proxy_no_cache $http_cache_control;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Добавление CORS заголовков
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
        
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
    
    # ========================================
    # WEBSOCKET ПРОКСИ
    # ========================================
    
    location /socket.io/ {
        proxy_pass http://aida_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
        proxy_cache off;
        
        proxy_connect_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
    
    # ========================================
    # ЗАГРУЖЕННЫЕ ФАЙЛЫ
    # ========================================
    
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        
        location ~* \.(jpg|jpeg|png|webp|gif|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        location ~* \.(mp4|webm|mov)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Accept-Ranges bytes;
        }
    }
    
    # ========================================
    # HLS ВИДЕО
    # ========================================
    
    location /hls/ {
        alias /var/www/uploads/hls/;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }
    
    # ========================================
    # АВАТАРЫ
    # ========================================
    
    location /avatars/ {
        alias /var/www/uploads/avatars/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # ========================================
    # ФАВИКОН
    # ========================================
    
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
    
    # ========================================
    # РОБОТЫ И SITEMAP
    # ========================================
    
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nAllow: /\nSitemap: https://aida.ru/sitemap.xml\n";
    }
    
    location = /sitemap.xml {
        proxy_pass http://aida_backend;
        proxy_set_header Host $host;
    }
    
    # ========================================
    # ЗДОРОВЬЕ
    # ========================================
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ========================================
    # ОСНОВНОЙ ПРОКСИ
    # ========================================
    
    location / {
        proxy_pass http://aida_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
        proxy_cache off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ============================================
# HTTPS - API (api.aida.ru)
# ============================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aida.ru;
    
    ssl_certificate /etc/letsencrypt/live/api.aida.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aida.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.aida.ru/chain.pem;
    
    include /etc/nginx/conf.d/ssl-params.conf;
    
    access_log /var/log/nginx/aida_api_access.log;
    error_log /var/log/nginx/aida_api_error.log;
    
    # API лимиты
    limit_req zone=api burst=100 nodelay;
    limit_conn conn_limit 20;
    
    location / {
        proxy_pass http://aida_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache api_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 1m;
        proxy_cache_bypass $http_cache_control;
        
        # CORS для API
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
        
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}

# ============================================
# HTTPS - АДМИН-ПАНЕЛЬ (admin.aida.ru)
# ============================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.aida.ru;
    
    ssl_certificate /etc/letsencrypt/live/admin.aida.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.aida.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/admin.aida.ru/chain.pem;
    
    include /etc/nginx/conf.d/ssl-params.conf;
    
    access_log /var/log/nginx/aida_admin_access.log;
    error_log /var/log/nginx/aida_admin_error.log;
    
    # Более строгие лимиты для админки
    limit_req zone=api burst=50 nodelay;
    limit_conn conn_limit 5;
    
    location / {
        proxy_pass http://aida_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Запрещаем кеширование админки
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}